    sql:`WITH deduped AS (\n  SELECT DISTINCT id, login_date FROM Logins\n),\nislands AS (\n  SELECT id, login_date,\n    login_date - INTERVAL ROW_NUMBER() OVER (PARTITION BY id ORDER BY login_date) DAY AS grp\n  FROM deduped\n)\nSELECT DISTINCT a.id, u.name\nFROM islands a\nJOIN Accounts u ON a.id = u.id\nGROUP BY a.id, u.name, a.grp\nHAVING COUNT(*) >= 5\nORDER BY a.id;`,
    insight:'Deduplicate logins first (a user may log in multiple times per day). Then apply the island-detection trick partitioned by user. HAVING >= 5 finds the qualifying consecutive streaks.' },

  { id:'lc1484', date:'2026-05-16', title:'Group Sold Products By The Date (LC #1484)', diff:'easy', topic:'aggregation', source:'LeetCode #1484',
    problem:'For each date, find the number of distinct products sold and their sorted comma-separated names.',
    sql:`SELECT sell_date,\n  COUNT(DISTINCT product) AS num_sold,\n  GROUP_CONCAT(DISTINCT product ORDER BY product SEPARATOR ',') AS products\nFROM Activities\nGROUP BY sell_date\nORDER BY sell_date;`,
    insight:'GROUP_CONCAT with DISTINCT + ORDER BY aggregates names into a sorted string per group — a MySQL-specific function. In PostgreSQL use STRING_AGG(DISTINCT product ORDER BY product).' }
];

function initData() {
  const existing = load();
  const existingIds = new Set(existing.map(p => p.id));
  const toAdd = seed.filter(p => !existingIds.has(p.id));
  if (toAdd.length > 0) save([...existing, ...toAdd]);
}

// ── STATE ─────────────────────────────────────────────────
let activeFilter = 'all';
let searchQuery = '';
let editingId = null;

// ── SQL HIGHLIGHT ─────────────────────────────────────────
function highlight(sql) {
  const keywords = ['SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','FULL','ON','AS','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','UNION','ALL','DISTINCT','WITH','CTE','PARTITION BY','OVER','ROWS','BETWEEN','UNBOUNDED','PRECEDING','CURRENT ROW','FOLLOWING','AND','OR','NOT','IN','IS','NULL','CASE','WHEN','THEN','ELSE','END','INSERT','UPDATE','DELETE','CREATE','DROP','ALTER','TABLE','INDEX','VIEW','COUNT','SUM','AVG','MAX','MIN','RANK','ROW_NUMBER','DENSE_RANK','LAG','LEAD','COALESCE','NULLIF','CAST','INTERVAL','EXISTS','BY','SET','VALUES','INTO'];
  let h = sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/--[^\n]*/g, m => `<span class="cmt">${m}</span>`);
  h = h.replace(/'[^']*'/g, m => `<span class="str">${m}</span>`);
  h = h.replace(/\b(\d+)\b/g, `<span class="num">$1</span>`);
  const kwRe = new RegExp(`\\b(${keywords.join('|')})\\b`, 'g');
  h = h.replace(kwRe, `<span class="kw">$1</span>`);
  return h;
}

// ── CALENDAR ─────────────────────────────────────────────
function renderCalendar(data) {
  const grid = document.getElementById('cal-grid');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('cal-label').textContent = `${months[month]} ${year} — activity`;

  const solvedDates = new Set(data.map(p => p.date));
  grid.innerHTML = '';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (solvedDates.has(dateStr) ? ' solved' : '') + (d === now.getDate() ? ' today' : '');
    cell.setAttribute('data-tip', `${months[month]} ${d}`);
    grid.appendChild(cell);
  }
}

// ── STATS ─────────────────────────────────────────────────
function computeStreak(data) {
  const dates = [...new Set(data.map(p => p.date))].sort().reverse();
  if (!dates.length) return 0;
  const today = new Date().toISOString().slice(0,10);
  if (dates[0] !== today && dates[0] !== new Date(Date.now()-86400000).toISOString().slice(0,10)) return 0;
  let streak = 0;
  let check = new Date(dates[0]);
  for (const d of dates) {
    if (d === check.toISOString().slice(0,10)) { streak++; check.setDate(check.getDate()-1); }
    else break;
  }
  return streak;
}

function thisWeek(data) {
  const now = new Date();
  const mon = new Date(now); mon.setDate(now.getDate() - now.getDay() + 1);
  mon.setHours(0,0,0,0);
  return data.filter(p => new Date(p.date) >= mon).length;
}

function updateStats(data) {
  const streak = computeStreak(data);
  document.getElementById('s-total').textContent = data.length;
  document.getElementById('s-streak').textContent = streak;
  document.getElementById('s-topics').textContent = new Set(data.map(p=>p.topic)).size;
  document.getElementById('s-this-week').textContent = thisWeek(data);
  document.getElementById('sidebar-streak').textContent = streak;
  document.getElementById('cnt-all').textContent = data.length;
  ['easy','medium','hard'].forEach(d => {
    document.getElementById(`cnt-${d}`).textContent = data.filter(p=>p.diff===d).length;
  });
}

// ── CARDS ─────────────────────────────────────────────────
function getFiltered() {
  let data = load();
  if (activeFilter !== 'all') {
    data = data.filter(p => p.diff === activeFilter || p.topic === activeFilter);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(p => p.title.toLowerCase().includes(q) || p.problem.toLowerCase().includes(q) || p.topic.toLowerCase().includes(q));
  }
  return data.sort((a,b) => b.date.localeCompare(a.date));
}

function renderCards() {
  const container = document.getElementById('cards-container');
  const data = getFiltered();
  const all = load();
  updateStats(all);
  renderCalendar(all);

  if (!data.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="big">📭</div>
      <p>No problems yet for this filter.<br>Hit <strong>+ Add problem</strong> to log your first one.</p>
    </div>`;
    return;
  }

  const dateGroups = {};
  data.forEach(p => {
    const d = new Date(p.date);
    const label = d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    if (!dateGroups[label]) dateGroups[label] = [];
    dateGroups[label].push(p);
  });

  let html = '<div class="cards-list">';
  Object.entries(dateGroups).forEach(([label, problems]) => {
    html += `<div style="font-size:11px;font-family:var(--mono);color:var(--muted);margin:8px 0 4px;">${label}</div>`;
    problems.forEach(p => {
      html += `
      <div class="card" id="card-${p.id}">
        <div class="card-header" onclick="toggleCard('${p.id}')">
          <span class="diff-badge diff-${p.diff}">${p.diff}</span>
          <span class="card-title">${p.title}</span>
          <span class="topic-pill">${p.topic}</span>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" onclick="editProblem('${p.id}')" title="Edit">✏️</button>
            <button class="icon-btn del" onclick="deleteProblem('${p.id}')" title="Delete">🗑</button>
          </div>
          <span class="chevron">▾</span>
        </div>
        <div class="card-body">
          <p class="problem-text">${p.problem}</p>
          <div class="code-wrap">
            <div class="code-header">
              <span class="code-lang">SQL</span>
              ${p.source ? `<span style="font-size:10px;font-family:var(--mono);color:var(--muted)">${p.source}</span>` : ''}
              <button class="copy-btn" onclick="copyCode('${p.id}',this)">copy</button>
            </div>
            <pre id="sql-${p.id}">${highlight(p.sql)}</pre>
          </div>
          ${p.insight ? `<div class="insight-box"><strong>Key insight:</strong> ${p.insight}</div>` : ''}
        </div>
      </div>`;
    });
  });
  html += '</div>';
  container.innerHTML = html;
}

function toggleCard(id) {
  document.getElementById(`card-${id}`).classList.toggle('open');
}

function copyCode(id, btn) {
  const data = load();
  const p = data.find(x => x.id === id);
  if (!p) return;
  navigator.clipboard.writeText(p.sql).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function deleteProblem(id) {
  if (!confirm('Delete this problem?')) return;
  const data = load().filter(p => p.id !== id);
  save(data);
  renderCards();
}

// ── MODAL ─────────────────────────────────────────────────
function openModal(prefill) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Log a problem';
  ['title','problem','sql','insight','source'].forEach(f => {
    document.getElementById(`f-${f}`).value = prefill?.[f] || '';
  });
  document.getElementById('f-diff').value = prefill?.diff || 'medium';
  document.getElementById('f-topic').value = prefill?.topic || 'joins';
  document.getElementById('modal').classList.add('open');
}

function editProblem(id) {
  const p = load().find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit problem';
  document.getElementById('f-title').value = p.title;
  document.getElementById('f-problem').value = p.problem;
  document.getElementById('f-sql').value = p.sql;
  document.getElementById('f-insight').value = p.insight || '';
  document.getElementById('f-source').value = p.source || '';
  document.getElementById('f-diff').value = p.diff;
  document.getElementById('f-topic').value = p.topic;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}
function closeModalBg(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function saveProblem() {
  const title = document.getElementById('f-title').value.trim();
  const sql   = document.getElementById('f-sql').value.trim();
  if (!title || !sql) { alert('Title and SQL solution are required.'); return; }

  const data = load();
  if (editingId) {
    const idx = data.findIndex(p => p.id === editingId);
    if (idx > -1) {
      data[idx] = { ...data[idx],
        title, sql,
        problem: document.getElementById('f-problem').value.trim(),
        insight: document.getElementById('f-insight').value.trim(),
        source:  document.getElementById('f-source').value.trim(),
        diff:    document.getElementById('f-diff').value,
        topic:   document.getElementById('f-topic').value,
      };
    }
  } else {
    data.unshift({
      id: 'p' + Date.now(),
      date: new Date().toISOString().slice(0,10),
      title, sql,
      problem: document.getElementById('f-problem').value.trim(),
      insight: document.getElementById('f-insight').value.trim(),
      source:  document.getElementById('f-source').value.trim(),
      diff:    document.getElementById('f-diff').value,
      topic:   document.getElementById('f-topic').value,
    });
  }
  save(data);
  closeModal();
  renderCards();
}

// ── FILTERS / SEARCH ──────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  searchQuery = '';
  document.querySelector('.search').value = '';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titles = { all:'All problems', easy:'Easy problems', medium:'Medium problems', hard:'Hard problems',
    joins:'JOINs', window:'Window functions', cte:'CTEs', aggregation:'Aggregation',
    subqueries:'Subqueries', indexes:'Indexes / Performance', other:'Other' };
  document.getElementById('view-title').textContent = titles[f] || f;
  renderCards();
}

function handleSearch(q) {
  searchQuery = q;
  renderCards();
}

// ── INIT ──────────────────────────────────────────────────
initData();
renderCards();
</script>
