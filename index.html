<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0e11;--surface:#141720;--surface2:#1c2030;--surface3:#232840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#dde2f0;--muted:#586080;--muted2:#8090b0;
  --green:#3ddc84;--green-dim:rgba(61,220,132,0.1);--green-border:rgba(61,220,132,0.25);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,0.1);--red-border:rgba(255,107,107,0.25);
  --amber:#ffb347;--amber-dim:rgba(255,179,71,0.1);
  --blue:#5b9cf6;--blue-dim:rgba(91,156,246,0.1);
  --purple:#a78bfa;
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;overflow:hidden;display:flex;flex-direction:column}
nav{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.nav-logo{font-size:15px;font-weight:600;letter-spacing:-0.3px}.nav-logo span{color:var(--green)}
.nav-meta{font-size:11px;color:var(--muted);font-family:var(--mono);background:var(--surface3);padding:3px 8px;border-radius:20px}
.nav-spacer{flex:1}
.progress-wrap{display:flex;align-items:center;gap:10px}
.progress-bar{width:120px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.progress-txt{font-size:11px;font-family:var(--mono);color:var(--muted2)}
.btn-nav{background:var(--surface2);border:1px solid var(--border);color:var(--muted2);font-family:var(--mono);font-size:12px;padding:5px 12px;border-radius:var(--r);cursor:pointer;transition:all .15s}
.btn-nav:hover{border-color:var(--border2);color:var(--text)}.btn-nav:disabled{opacity:.3;cursor:default}
.app{display:grid;grid-template-columns:300px 1fr;flex:1;overflow:hidden;min-height:0}
.panel-left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.panel-left-top{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.flt{font-size:11px;font-family:var(--mono);padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s}
.flt:hover{border-color:var(--border2);color:var(--text)}.flt.on{background:var(--surface3);border-color:var(--border2);color:var(--text)}
.search-inp{width:100%;margin-top:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s}
.search-inp:focus{border-color:var(--border2)}.search-inp::placeholder{color:var(--muted)}
.problem-list{overflow-y:auto;flex:1}
.problem-list::-webkit-scrollbar{width:4px}
.problem-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.prob-item{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.prob-item:hover{background:var(--surface2)}.prob-item.active{background:var(--surface3);border-left:2px solid var(--green)}
.prob-num{font-size:10px;font-family:var(--mono);color:var(--muted);min-width:24px}
.prob-title{font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prob-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-easy{background:var(--green);opacity:.7}.dot-medium{background:var(--amber);opacity:.7}.dot-hard{background:var(--red);opacity:.7}
.prob-check{font-size:10px;color:var(--green)}
.panel-right{display:flex;flex-direction:column;overflow:hidden;min-height:0}
.prob-header{padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.prob-header-top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.prob-header h2{font-size:15px;font-weight:600;flex:1}
.diff-badge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;font-weight:500}
.diff-easy{background:rgba(61,220,132,.13);color:var(--green)}.diff-medium{background:rgba(255,179,71,.13);color:var(--amber)}.diff-hard{background:rgba(255,107,107,.13);color:var(--red)}
.prob-src{font-size:11px;font-family:var(--mono);color:var(--muted)}
.prob-desc{font-size:13px;color:var(--muted2);line-height:1.6;font-family:var(--mono)}
.schema-strip{padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;gap:12px;flex-wrap:wrap;overflow-x:auto}
.schema-table{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;font-family:var(--mono);font-size:11px;flex-shrink:0}
.schema-table-name{padding:4px 9px;background:var(--surface3);color:var(--purple);border-bottom:1px solid var(--border);font-weight:500}
.schema-cols{padding:5px 9px;display:flex;flex-direction:column;gap:2px}
.sc{color:var(--muted2)}.sc .cn{color:var(--text)}.sc .pk{color:var(--amber);font-size:10px;margin-left:3px}.sc .fk{color:var(--blue);font-size:10px;margin-left:3px}
.work-area{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.editor-wrap{flex:1;display:flex;flex-direction:column;padding:12px 18px 0;overflow:hidden;min-height:0}
.editor-label{font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center}
.editor-label .hint{margin-left:auto;font-size:10px}
.editor{flex:1;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-family:var(--mono);font-size:13px;color:var(--text);resize:none;outline:none;line-height:1.7;transition:border-color .15s;min-height:80px}
.editor:focus{border-color:var(--border2)}.editor::placeholder{color:var(--muted)}
.editor.correct{border-color:var(--green-border);background:rgba(61,220,132,0.03)}.editor.wrong{border-color:var(--red-border);background:rgba(255,107,107,0.03)}
.action-bar{display:flex;align-items:center;gap:8px;padding:10px 18px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.btn-run{background:var(--green);color:#0c0e11;border:none;padding:8px 20px;border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-run:hover{opacity:.88}.btn-run:disabled{opacity:.4;cursor:default}
.btn-sm{background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:7px 14px;border-radius:var(--r);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s}
.btn-sm:hover{color:var(--text);border-color:var(--border)}.btn-ans{color:var(--muted)}.btn-ans:hover{color:var(--amber);border-color:rgba(255,179,71,.3)}
.shortcut{font-size:11px;font-family:var(--mono);color:var(--muted);margin-left:auto}
kbd{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;font-size:10px}
.result-panel{border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;height:220px;display:flex;flex-direction:column;overflow:hidden}
.result-header{display:flex;align-items:center;gap:10px;padding:7px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.result-status{font-size:12px;font-family:var(--mono);font-weight:500}
.s-idle{color:var(--muted)}.s-ok{color:var(--green)}.s-err{color:var(--red)}.s-warn{color:var(--amber)}
.result-tabs{display:flex;gap:4px;margin-left:auto}
.rtab{font-size:11px;font-family:var(--mono);padding:3px 10px;border-radius:5px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.rtab.on{background:var(--surface3);color:var(--text)}
.result-body{overflow:auto;flex:1;padding:8px 18px}
.result-body::-webkit-scrollbar{width:4px;height:4px}
.result-body::-webkit-scrollbar-thumb{background:var(--surface3)}
table.rt{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
table.rt th{padding:4px 10px;text-align:left;color:var(--muted2);border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap}
table.rt td{padding:4px 10px;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap}
table.rt tr:last-child td{border-bottom:none}
.null-val{color:var(--muted)}
.hint-box{background:var(--amber-dim);border:1px solid rgba(255,179,71,.2);border-radius:var(--r);padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--amber);line-height:1.6}
.ans-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--muted2);line-height:1.8;white-space:pre;overflow-x:auto}
.insight-box{background:var(--blue-dim);border:1px solid rgba(91,156,246,.2);border-radius:var(--r);padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--blue);line-height:1.6}
.empty{color:var(--muted);font-family:var(--mono);font-size:12px;padding:6px 0}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.loading-overlay.hidden{display:none}
.loading-title{font-size:18px;font-weight:600}.loading-title span{color:var(--green)}
.loading-sub{font-size:12px;font-family:var(--mono);color:var(--muted)}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:9px 16px;font-family:var(--mono);font-size:12px;color:var(--text);z-index:1000;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}.toast.g{border-color:var(--green-border);color:var(--green)}.toast.r{border-color:var(--red-border);color:var(--red)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
</style>
</head>
<body>
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-title"><span>SQL</span> Practice</div>
  <div class="loading-sub" id="lmsg">Loading SQL engine...</div>
</div>
<div class="toast" id="toast"></div>
<nav>
  <div class="nav-logo"><span>SQL</span> Practice</div>
  <div class="nav-meta" id="nav-topic">–</div>
  <div class="nav-spacer"></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-txt" id="prog-txt">0 / 0</div>
  </div>
  <button class="btn-nav" id="btn-prev" onclick="navigate(-1)" disabled>← prev</button>
  <button class="btn-nav" id="btn-next" onclick="navigate(1)">next →</button>
</nav>
<div class="app">
  <div class="panel-left">
    <div class="panel-left-top">
      <div class="filter-row">
        <button class="flt on" onclick="setFilter('all',this)">All</button>
        <button class="flt" onclick="setFilter('easy',this)">Easy</button>
        <button class="flt" onclick="setFilter('medium',this)">Med</button>
        <button class="flt" onclick="setFilter('hard',this)">Hard</button>
        <button class="flt" onclick="setFilter('joins',this)">JOIN</button>
        <button class="flt" onclick="setFilter('window',this)">WIN</button>
        <button class="flt" onclick="setFilter('aggregation',this)">AGG</button>
        <button class="flt" onclick="setFilter('cte',this)">CTE</button>
      </div>
      <input class="search-inp" type="text" placeholder="Search..." oninput="handleSearch(this.value)">
    </div>
    <div class="problem-list" id="prob-list"></div>
  </div>
  <div class="panel-right">
    <div class="prob-header">
      <div class="prob-header-top">
        <h2 id="ph-title">Select a problem</h2>
        <span class="diff-badge" id="ph-diff"></span>
        <span class="prob-src" id="ph-src"></span>
      </div>
      <div class="prob-desc" id="ph-desc">← Pick a problem from the list to start practicing.</div>
    </div>
    <div class="schema-strip" id="schema-strip"></div>
    <div class="work-area">
      <div class="editor-wrap">
        <div class="editor-label">your query <span class="hint" style="color:var(--muted)"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run</span></div>
        <textarea class="editor" id="editor" placeholder="-- Write your SQL here&#10;SELECT ..." spellcheck="false"></textarea>
      </div>
      <div class="action-bar">
        <button class="btn-run" id="btn-run" onclick="runQuery()" disabled>▶ Run</button>
        <button class="btn-sm" onclick="switchTab('hint')">💡 Hint</button>
        <button class="btn-sm btn-ans" onclick="switchTab('hint')">Show answer</button>
        <span class="shortcut"></span>
      </div>
    </div>
    <div class="result-panel">
      <div class="result-header">
        <span class="result-status s-idle" id="result-status">Ready</span>
        <div class="result-tabs">
          <button class="rtab on" id="tab-output" onclick="switchTab('output')">output</button>
          <button class="rtab" id="tab-expected" onclick="switchTab('expected')">expected</button>
          <button class="rtab" id="tab-hint" onclick="switchTab('hint')">hint / answer</button>
        </div>
      </div>
      <div class="result-body" id="result-body"><div class="empty">Run your query to see results.</div></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
const P=[
{id:'lc175',diff:'easy',topic:'joins',source:'LC #175',title:'Combine Two Tables',
desc:'Report firstName, lastName, city, state for every person — even those with no address (show NULL for city/state).',
schema:[{n:'Person',c:['personId INT (PK)','lastName VARCHAR','firstName VARCHAR']},{n:'Address',c:['addressId INT (PK)','personId INT (FK)','city VARCHAR','state VARCHAR']}],
setup:`CREATE TABLE Person(personId INT,lastName TEXT,firstName TEXT);CREATE TABLE Address(addressId INT,personId INT,city TEXT,state TEXT);INSERT INTO Person VALUES(1,'Wang','Allen'),(2,'Alice','Bob');INSERT INTO Address VALUES(1,2,'New York City','New York'),(2,3,'Leetcode','California');`,
answer:`SELECT p.firstName, p.lastName, a.city, a.state\nFROM Person p\nLEFT JOIN Address a ON p.personId = a.personId;`,
hint:'Every person must appear — even without an address. Which JOIN keeps all rows from the left table?',
insight:'LEFT JOIN preserves all Person rows. Allen Wang has no address so city/state are NULL.'},

{id:'lc182',diff:'easy',topic:'aggregation',source:'LC #182',title:'Duplicate Emails',
desc:'Find all emails that appear more than once in the Person table.',
schema:[{n:'Person',c:['id INT (PK)','email VARCHAR']}],
setup:`CREATE TABLE Person(id INT,email TEXT);INSERT INTO Person VALUES(1,'a@b.com'),(2,'c@d.com'),(3,'a@b.com');`,
answer:`SELECT email FROM Person GROUP BY email HAVING COUNT(*) > 1;`,
hint:'GROUP BY email, then use HAVING to filter groups where COUNT > 1.',
insight:'HAVING filters groups after aggregation. WHERE cannot reference COUNT.'},

{id:'lc183',diff:'easy',topic:'subqueries',source:'LC #183',title:'Customers Who Never Order',
desc:'Find the names of customers who have never placed any order.',
schema:[{n:'Customers',c:['id INT (PK)','name VARCHAR']},{n:'Orders',c:['id INT (PK)','customerId INT (FK)']}],
setup:`CREATE TABLE Customers(id INT,name TEXT);CREATE TABLE Orders(id INT,customerId INT);INSERT INTO Customers VALUES(1,'Joe'),(2,'Henry'),(3,'Sam'),(4,'Max');INSERT INTO Orders VALUES(1,3),(2,1);`,
answer:`SELECT name AS Customers FROM Customers WHERE id NOT IN (SELECT customerId FROM Orders);`,
hint:'Get all customerIds who have orders in a subquery, then exclude them.',
insight:'NOT IN subquery is the classic set-difference. Safe here since customerId is non-nullable.'},

{id:'lc197',diff:'easy',topic:'joins',source:'LC #197',title:'Rising Temperature',
desc:'Find all IDs where the temperature was higher than the previous day.',
schema:[{n:'Weather',c:['id INT (PK)','recordDate DATE','temperature INT']}],
setup:`CREATE TABLE Weather(id INT,recordDate TEXT,temperature INT);INSERT INTO Weather VALUES(1,'2015-01-01',10),(2,'2015-01-02',25),(3,'2015-01-03',20),(4,'2015-01-04',30);`,
answer:`SELECT w1.id FROM Weather w1\nJOIN Weather w2 ON date(w1.recordDate) = date(w2.recordDate, '+1 day')\nWHERE w1.temperature > w2.temperature;`,
hint:'Self-join where one row\'s date is exactly 1 day after the other.',
insight:'Self-join on date difference finds consecutive days. Never assume consecutive IDs = consecutive dates.'},

{id:'lc511',diff:'easy',topic:'aggregation',source:'LC #511',title:'Game Play Analysis I',
desc:'Find the first login date for each player.',
schema:[{n:'Activity',c:['player_id INT','device_id INT','event_date DATE','games_played INT']}],
setup:`CREATE TABLE Activity(player_id INT,device_id INT,event_date TEXT,games_played INT);INSERT INTO Activity VALUES(1,2,'2016-03-01',5),(1,2,'2016-05-02',6),(2,3,'2017-06-25',1),(3,1,'2016-03-02',0),(3,4,'2018-07-03',5);`,
answer:`SELECT player_id, MIN(event_date) AS first_login FROM Activity GROUP BY player_id;`,
hint:'MIN(date) grouped by player gives the earliest login.',
insight:'MIN(date) per group is the standard "first event" analytics pattern.'},

{id:'lc577',diff:'easy',topic:'joins',source:'LC #577',title:'Employee Bonus',
desc:'Report name and bonus of each employee whose bonus is < 1000 or who has no bonus record.',
schema:[{n:'Employee',c:['empId INT (PK)','name VARCHAR','supervisor INT','salary INT']},{n:'Bonus',c:['empId INT (PK)','bonus INT']}],
setup:`CREATE TABLE Employee(empId INT,name TEXT,supervisor INT,salary INT);CREATE TABLE Bonus(empId INT,bonus INT);INSERT INTO Employee VALUES(3,'Brad',null,4000),(1,'John',3,1000),(2,'Dan',3,2000),(4,'Thomas',3,4000);INSERT INTO Bonus VALUES(2,500),(4,2000);`,
answer:`SELECT e.name, b.bonus FROM Employee e\nLEFT JOIN Bonus b ON e.empId = b.empId\nWHERE b.bonus < 1000 OR b.bonus IS NULL;`,
hint:'LEFT JOIN so employees with no bonus row still appear. Filter bonus < 1000 OR IS NULL.',
insight:'Without LEFT JOIN, employees with no bonus are silently excluded.'},

{id:'lc584',diff:'easy',topic:'other',source:'LC #584',title:'Find Customer Referee',
desc:"Find customer names NOT referred by customer id = 2.",
schema:[{n:'Customer',c:['id INT (PK)','name VARCHAR','referee_id INT']}],
setup:`CREATE TABLE Customer(id INT,name TEXT,referee_id INT);INSERT INTO Customer VALUES(1,'Will',null),(2,'Jane',null),(3,'Alex',2),(4,'Bill',null),(5,'Zach',1),(6,'Mark',2);`,
answer:`SELECT name FROM Customer WHERE referee_id != 2 OR referee_id IS NULL;`,
hint:'NULL != 2 evaluates to UNKNOWN in SQL, not TRUE. You must explicitly handle NULLs.',
insight:'NULL comparisons return UNKNOWN. Without OR IS NULL, customers with no referee are dropped.'},

{id:'lc586',diff:'easy',topic:'aggregation',source:'LC #586',title:'Customer Placing Largest Number of Orders',
desc:'Find the customer_number who placed the most orders.',
schema:[{n:'Orders',c:['order_number INT (PK)','customer_number INT']}],
setup:`CREATE TABLE Orders(order_number INT,customer_number INT);INSERT INTO Orders VALUES(1,1),(2,2),(3,3),(4,3);`,
answer:`SELECT customer_number FROM Orders GROUP BY customer_number ORDER BY COUNT(*) DESC LIMIT 1;`,
hint:'Count orders per customer, sort descending, take the top row.',
insight:'ORDER BY aggregate DESC + LIMIT 1 is the simplest top-1 pattern.'},

{id:'lc595',diff:'easy',topic:'other',source:'LC #595',title:'Big Countries',
desc:'Find countries with area >= 3,000,000 OR population >= 25,000,000.',
schema:[{n:'World',c:['name VARCHAR','continent VARCHAR','area INT','population INT','gdp INT']}],
setup:`CREATE TABLE World(name TEXT,continent TEXT,area INT,population INT,gdp INT);INSERT INTO World VALUES('Afghanistan','Asia',652230,25500100,20343000),('Albania','Europe',28748,2831741,12960000),('Algeria','Africa',2381741,37100000,188681000),('Andorra','Europe',468,78115,3712000),('Angola','Africa',1246700,20609294,100990000);`,
answer:`SELECT name, population, area FROM World WHERE area >= 3000000 OR population >= 25000000;`,
hint:'Simple WHERE with OR. Both conditions qualify a country independently.',
insight:'OR is inclusive — a country satisfying either condition appears once.'},

{id:'lc596',diff:'easy',topic:'aggregation',source:'LC #596',title:'Classes More Than 5 Students',
desc:'Find all classes that have at least 5 students enrolled.',
schema:[{n:'Courses',c:['student VARCHAR','class VARCHAR']}],
setup:`CREATE TABLE Courses(student TEXT,class TEXT);INSERT INTO Courses VALUES('A','Math'),('B','English'),('C','Math'),('D','Biology'),('E','Math'),('F','Computer'),('G','Math'),('H','Math'),('I','Math');`,
answer:`SELECT class FROM Courses GROUP BY class HAVING COUNT(student) >= 5;`,
hint:'HAVING filters after GROUP BY. Count students per class.',
insight:'HAVING is post-aggregation. WHERE runs before GROUP BY and cannot reference COUNT.'},

{id:'lc607',diff:'easy',topic:'joins',source:'LC #607',title:'Sales Person',
desc:'Find salesperson names with NO orders related to company "RED".',
schema:[{n:'SalesPerson',c:['sales_id INT (PK)','name VARCHAR','salary INT']},{n:'Company',c:['com_id INT (PK)','name VARCHAR']},{n:'Orders',c:['order_id INT (PK)','com_id INT (FK)','sales_id INT (FK)','amount INT']}],
setup:`CREATE TABLE SalesPerson(sales_id INT,name TEXT,salary INT,commission_rate INT,hire_date TEXT);CREATE TABLE Company(com_id INT,name TEXT,city TEXT);CREATE TABLE Orders(order_id INT,order_date TEXT,com_id INT,sales_id INT,amount INT);INSERT INTO SalesPerson VALUES(1,'John',100000,6,'4/1/2006'),(2,'Amy',12000,5,'5/1/2010'),(3,'Mark',65000,12,'12/25/2008'),(4,'Pam',25000,25,'1/1/2005'),(5,'Alex',5000,10,'2/3/2007');INSERT INTO Company VALUES(1,'RED','Boston'),(2,'ORANGE','New York'),(3,'YELLOW','Boston');INSERT INTO Orders VALUES(1,'1/1/2014',3,4,10000),(2,'2/1/2014',4,5,5000),(3,'3/1/2014',1,1,50000),(4,'4/1/2014',1,4,25000);`,
answer:`SELECT name FROM SalesPerson WHERE sales_id NOT IN (\n  SELECT o.sales_id FROM Orders o JOIN Company c ON o.com_id=c.com_id WHERE c.name='RED'\n);`,
hint:'Find sales_ids who sold to RED via a subquery, then exclude them.',
insight:'NOT IN subquery for set exclusion. Verify the subquery cannot return NULLs.'},

{id:'lc610',diff:'easy',topic:'other',source:'LC #610',title:'Triangle Judgement',
desc:'For each row determine if x, y, z can form a valid triangle.',
schema:[{n:'Triangle',c:['x INT','y INT','z INT']}],
setup:`CREATE TABLE Triangle(x INT,y INT,z INT);INSERT INTO Triangle VALUES(13,15,30),(10,20,15);`,
answer:`SELECT x, y, z, CASE WHEN x+y>z AND x+z>y AND y+z>x THEN 'Yes' ELSE 'No' END AS triangle FROM Triangle;`,
hint:'Triangle inequality: all three pairs of sides must sum to more than the third.',
insight:'CASE WHEN on computed expressions — no joins or aggregates needed.'},

{id:'lc619',diff:'easy',topic:'subqueries',source:'LC #619',title:'Biggest Single Number',
desc:'Find the largest number that appears only once. Return NULL if none.',
schema:[{n:'MyNumbers',c:['num INT']}],
setup:`CREATE TABLE MyNumbers(num INT);INSERT INTO MyNumbers VALUES(8),(8),(3),(3),(1),(4),(5),(6);`,
answer:`SELECT MAX(num) AS num FROM MyNumbers GROUP BY num HAVING COUNT(*) = 1;`,
hint:'Filter to numbers appearing exactly once with HAVING COUNT=1, then MAX.',
insight:'MAX returns NULL automatically when no rows qualify.'},

{id:'lc620',diff:'easy',topic:'other',source:'LC #620',title:'Not Boring Movies',
desc:"Report movies with odd id and description not 'boring', ordered by rating descending.",
schema:[{n:'Cinema',c:['id INT (PK)','movie VARCHAR','description VARCHAR','rating FLOAT']}],
setup:`CREATE TABLE Cinema(id INT,movie TEXT,description TEXT,rating REAL);INSERT INTO Cinema VALUES(1,'War','great 3D',8.9),(2,'Science','fiction',8.5),(3,'irish','boring',6.2),(4,'Ice song','Fantacy',8.6),(5,'House card','Interesting',9.1);`,
answer:`SELECT * FROM Cinema WHERE id % 2 = 1 AND description != 'boring' ORDER BY rating DESC;`,
hint:'Modulo % 2 = 1 tests odd. Combine conditions with AND, sort by rating.',
insight:'Modulo is the standard odd/even test in SQL.'},

{id:'lc627',diff:'easy',topic:'other',source:'LC #627',title:'Swap Salary',
desc:"Swap all 'm' and 'f' values in one UPDATE. Query the result.",
schema:[{n:'Salary',c:['id INT (PK)','name VARCHAR','sex CHAR','salary INT']}],
setup:`CREATE TABLE Salary(id INT,name TEXT,sex TEXT,salary INT);INSERT INTO Salary VALUES(1,'A','m',2500),(2,'B','f',1500),(3,'C','m',5500),(4,'D','f',500);`,
answer:`UPDATE Salary SET sex = CASE WHEN sex='m' THEN 'f' ELSE 'm' END;\nSELECT * FROM Salary;`,
hint:'CASE WHEN inside UPDATE toggles the value. No temp table needed.',
insight:'CASE inside UPDATE is the standard toggle pattern.'},

{id:'lc1050',diff:'easy',topic:'aggregation',source:'LC #1050',title:'Actors & Directors: 3+ Cooperations',
desc:'Find (actor_id, director_id) pairs that cooperated at least 3 times.',
schema:[{n:'ActorDirector',c:['actor_id INT','director_id INT','timestamp INT']}],
setup:`CREATE TABLE ActorDirector(actor_id INT,director_id INT,timestamp INT);INSERT INTO ActorDirector VALUES(1,1,0),(1,1,1),(1,1,2),(1,2,3),(1,2,4),(2,1,5),(2,1,6);`,
answer:`SELECT actor_id, director_id FROM ActorDirector GROUP BY actor_id, director_id HAVING COUNT(*) >= 3;`,
hint:'GROUP BY the pair, HAVING COUNT >= 3.',
insight:'GROUP BY on multiple columns groups by the combination.'},

{id:'lc1068',diff:'easy',topic:'joins',source:'LC #1068',title:'Product Sales Analysis I',
desc:'Report product_name, year, and price for each sale.',
schema:[{n:'Sales',c:['sale_id INT (PK)','product_id INT (FK)','year INT','quantity INT','price INT']},{n:'Product',c:['product_id INT (PK)','product_name VARCHAR']}],
setup:`CREATE TABLE Sales(sale_id INT,product_id INT,year INT,quantity INT,price INT);CREATE TABLE Product(product_id INT,product_name TEXT);INSERT INTO Sales VALUES(1,100,2008,10,5000),(2,100,2009,12,5000),(7,200,2011,15,9000);INSERT INTO Product VALUES(100,'Nokia'),(200,'Apple'),(300,'Samsung');`,
answer:`SELECT p.product_name, s.year, s.price FROM Sales s JOIN Product p ON s.product_id = p.product_id;`,
hint:'JOIN on product_id to bring product_name alongside sale data.',
insight:'Sales is the fact table; Product is the dimension. INNER JOIN is correct — every sale has a product.'},

{id:'lc1069',diff:'easy',topic:'aggregation',source:'LC #1069',title:'Product Sales Analysis II',
desc:'Report the total quantity sold for each product_id.',
schema:[{n:'Sales',c:['sale_id INT (PK)','product_id INT (FK)','year INT','quantity INT','price INT']}],
setup:`CREATE TABLE Sales(sale_id INT,product_id INT,year INT,quantity INT,price INT);INSERT INTO Sales VALUES(1,100,2008,10,5000),(2,100,2009,12,5000),(7,200,2011,15,9000);`,
answer:`SELECT product_id, SUM(quantity) AS total_quantity FROM Sales GROUP BY product_id;`,
hint:'SUM + GROUP BY product_id.',
insight:'The fundamental sales aggregation pattern.'},

{id:'lc1075',diff:'easy',topic:'joins',source:'LC #1075',title:'Project Employees I',
desc:'Report average experience years per project, rounded to 2 decimal places.',
schema:[{n:'Project',c:['project_id INT (PK)','employee_id INT (FK)']},{n:'Employee',c:['employee_id INT (PK)','name VARCHAR','experience_years INT']}],
setup:`CREATE TABLE Project(project_id INT,employee_id INT);CREATE TABLE Employee(employee_id INT,name TEXT,experience_years INT);INSERT INTO Project VALUES(1,1),(1,2),(1,3),(2,1),(2,4);INSERT INTO Employee VALUES(1,'Khaled',3),(2,'Ali',2),(3,'John',1),(4,'Doe',2);`,
answer:`SELECT p.project_id, ROUND(AVG(e.experience_years),2) AS average_years\nFROM Project p JOIN Employee e ON p.employee_id=e.employee_id\nGROUP BY p.project_id;`,
hint:'JOIN, GROUP BY project_id, then ROUND(AVG(...), 2).',
insight:'JOIN before aggregating. ROUND(AVG(...),2) is the standard formatted average.'},

// MEDIUM
{id:'lc176',diff:'medium',topic:'subqueries',source:'LC #176',title:'Second Highest Salary',
desc:'Find the second highest distinct salary. Return NULL if it does not exist.',
schema:[{n:'Employee',c:['id INT (PK)','salary INT']}],
setup:`CREATE TABLE Employee(id INT,salary INT);INSERT INTO Employee VALUES(1,100),(2,200),(3,300);`,
answer:`SELECT MAX(salary) AS SecondHighestSalary FROM Employee WHERE salary < (SELECT MAX(salary) FROM Employee);`,
hint:'Find MAX salary, then find MAX of all salaries below that value.',
insight:'This pattern returns NULL naturally when only one distinct salary exists.'},

{id:'lc178',diff:'medium',topic:'window',source:'LC #178',title:'Rank Scores',
desc:'Rank scores highest first. Ties share the same rank and the next rank is NOT skipped.',
schema:[{n:'Scores',c:['id INT (PK)','score DECIMAL']}],
setup:`CREATE TABLE Scores(id INT,score REAL);INSERT INTO Scores VALUES(1,3.50),(2,3.65),(3,4.00),(4,3.85),(5,4.00),(6,3.65);`,
answer:`SELECT score, DENSE_RANK() OVER (ORDER BY score DESC) AS rank FROM Scores ORDER BY score DESC;`,
hint:'DENSE_RANK shares rank AND does not skip the next number after a tie.',
insight:'RANK skips numbers after ties; ROW_NUMBER ignores ties. DENSE_RANK is correct here.'},

{id:'lc180',diff:'medium',topic:'joins',source:'LC #180',title:'Consecutive Numbers',
desc:'Find all numbers that appear at least 3 times consecutively.',
schema:[{n:'Logs',c:['id INT (PK)','num VARCHAR']}],
setup:`CREATE TABLE Logs(id INT,num TEXT);INSERT INTO Logs VALUES(1,'1'),(2,'1'),(3,'1'),(4,'2'),(5,'1'),(6,'2'),(7,'2');`,
answer:`SELECT DISTINCT l1.num AS ConsecutiveNums FROM Logs l1\nJOIN Logs l2 ON l2.id=l1.id+1 AND l2.num=l1.num\nJOIN Logs l3 ON l3.id=l1.id+2 AND l3.num=l1.num;`,
hint:'Self-join three times on id, id+1, id+2 — all with the same num.',
insight:'Works when IDs are consecutive integers with no gaps.'},

{id:'lc184',diff:'medium',topic:'subqueries',source:'LC #184',title:'Department Highest Salary',
desc:'Find employees who have the highest salary in each department.',
schema:[{n:'Employee',c:['id INT (PK)','name VARCHAR','salary INT','departmentId INT (FK)']},{n:'Department',c:['id INT (PK)','name VARCHAR']}],
setup:`CREATE TABLE Employee(id INT,name TEXT,salary INT,departmentId INT);CREATE TABLE Department(id INT,name TEXT);INSERT INTO Employee VALUES(1,'Joe',70000,1),(2,'Jim',90000,1),(3,'Henry',80000,2),(4,'Sam',60000,2),(5,'Max',90000,1);INSERT INTO Department VALUES(1,'IT'),(2,'Sales');`,
answer:`SELECT d.name AS Department, e.name AS Employee, e.salary AS Salary\nFROM Employee e JOIN Department d ON e.departmentId=d.id\nWHERE (e.departmentId, e.salary) IN (\n  SELECT departmentId, MAX(salary) FROM Employee GROUP BY departmentId\n);`,
hint:'Find MAX salary per department in a subquery. Match rows using a tuple IN condition.',
insight:'Tuple IN (col1, col2) lets you match two columns simultaneously.'},

{id:'lc534',diff:'medium',topic:'window',source:'LC #534',title:'Game Play Analysis III',
desc:'Report the running total of games played by each player up to each date.',
schema:[{n:'Activity',c:['player_id INT','device_id INT','event_date DATE','games_played INT']}],
setup:`CREATE TABLE Activity(player_id INT,device_id INT,event_date TEXT,games_played INT);INSERT INTO Activity VALUES(1,2,'2016-03-01',5),(1,2,'2016-05-02',6),(1,3,'2017-06-25',1),(3,1,'2016-03-02',0),(3,4,'2018-07-03',5);`,
answer:`SELECT player_id, event_date,\n  SUM(games_played) OVER (PARTITION BY player_id ORDER BY event_date) AS games_played_so_far\nFROM Activity;`,
hint:'SUM() OVER (PARTITION BY player_id ORDER BY event_date) = running sum per player.',
insight:'No explicit ROWS frame needed — the default is RANGE UNBOUNDED PRECEDING.'},

{id:'lc570',diff:'medium',topic:'aggregation',source:'LC #570',title:'Managers with 5+ Direct Reports',
desc:'Find managers who have at least 5 direct reports.',
schema:[{n:'Employee',c:['id INT (PK)','name VARCHAR','department VARCHAR','managerId INT']}],
setup:`CREATE TABLE Employee(id INT,name TEXT,department TEXT,managerId INT);INSERT INTO Employee VALUES(101,'John','A',null),(102,'Dan','A',101),(103,'James','A',101),(104,'Amy','A',101),(105,'Anne','A',101),(106,'Ron','B',101);`,
answer:`SELECT name FROM Employee WHERE id IN (\n  SELECT managerId FROM Employee GROUP BY managerId HAVING COUNT(*) >= 5\n);`,
hint:'Find manager IDs with 5+ reports in a subquery, then look up their names.',
insight:'Aggregate to find qualifying manager IDs first, then lookup names outer query.'},

{id:'lc626',diff:'medium',topic:'window',source:'LC #626',title:'Exchange Seats',
desc:'Swap seat ids of every two consecutive students. Last student keeps seat if count is odd.',
schema:[{n:'Seat',c:['id INT (PK)','student VARCHAR']}],
setup:`CREATE TABLE Seat(id INT,student TEXT);INSERT INTO Seat VALUES(1,'Abbot'),(2,'Doris'),(3,'Emerson'),(4,'Green'),(5,'Jeames');`,
answer:`SELECT\n  CASE\n    WHEN id%2=1 AND id=(SELECT COUNT(*) FROM Seat) THEN id\n    WHEN id%2=1 THEN id+1\n    ELSE id-1\n  END AS id, student\nFROM Seat ORDER BY id;`,
hint:'Three cases: last odd stays, other odds go +1, evens go -1.',
insight:'Subquery for max id handles the odd-total edge case.'},

{id:'lc1045',diff:'medium',topic:'aggregation',source:'LC #1045',title:'Customers Who Bought All Products',
desc:'Find customer_ids who bought every product in the Product table.',
schema:[{n:'Customer',c:['customer_id INT','product_key INT']},{n:'Product',c:['product_key INT (PK)']}],
setup:`CREATE TABLE Customer(customer_id INT,product_key INT);CREATE TABLE Product(product_key INT);INSERT INTO Customer VALUES(1,5),(2,6),(3,5),(3,6),(1,6);INSERT INTO Product VALUES(5),(6);`,
answer:`SELECT customer_id FROM Customer GROUP BY customer_id\nHAVING COUNT(DISTINCT product_key) = (SELECT COUNT(*) FROM Product);`,
hint:'Count distinct products per customer. Compare to total product count.',
insight:'Relational division via COUNT(DISTINCT) = total. Missing one product = lower count.'},

{id:'lc1070',diff:'medium',topic:'subqueries',source:'LC #1070',title:'Product Sales Analysis III',
desc:'Select the first year each product was sold, along with quantity and price.',
schema:[{n:'Sales',c:['sale_id INT (PK)','product_id INT (FK)','year INT','quantity INT','price INT']}],
setup:`CREATE TABLE Sales(sale_id INT,product_id INT,year INT,quantity INT,price INT);INSERT INTO Sales VALUES(1,100,2008,10,5000),(2,100,2009,12,5000),(7,200,2011,15,9000);`,
answer:`SELECT product_id, year AS first_year, quantity, price FROM Sales\nWHERE (product_id, year) IN (SELECT product_id, MIN(year) FROM Sales GROUP BY product_id);`,
hint:'Subquery finds MIN(year) per product. Tuple IN matches those exact rows.',
insight:'Tuple-in-subquery filters on multiple columns simultaneously.'},

{id:'lc1084',diff:'medium',topic:'aggregation',source:'LC #1084',title:'Sales Analysis III',
desc:'Report products sold ONLY in spring 2019 (2019-01-01 to 2019-03-31).',
schema:[{n:'Sales',c:['sale_id INT (PK)','product_id INT (FK)','sale_date DATE','quantity INT']},{n:'Product',c:['product_id INT (PK)','product_name VARCHAR','unit_price INT']}],
setup:`CREATE TABLE Sales(sale_id INT,product_id INT,sale_date TEXT,quantity INT);CREATE TABLE Product(product_id INT,product_name TEXT,unit_price INT);INSERT INTO Sales VALUES(1,1,'2019-01-28',2),(2,2,'2019-02-16',1),(3,3,'2019-03-11',2),(4,3,'2019-03-24',2),(5,4,'2019-04-21',2),(6,4,'2019-01-29',2);INSERT INTO Product VALUES(1,'S8',1000),(2,'G4',800),(3,'iPhone',1400),(4,'iPad',900);`,
answer:`SELECT s.product_id, p.product_name FROM Sales s JOIN Product p ON s.product_id=p.product_id\nGROUP BY s.product_id, p.product_name\nHAVING MIN(s.sale_date)>='2019-01-01' AND MAX(s.sale_date)<='2019-03-31';`,
hint:'If MIN(sale_date) >= start AND MAX(sale_date) <= end, ALL sales are in the window.',
insight:'MIN/MAX bracket the entire history — both inside the window means every sale is inside.'},

{id:'lc1158',diff:'medium',topic:'joins',source:'LC #1158',title:'Market Analysis I',
desc:"Report each user's join date and count of orders they placed in 2019.",
schema:[{n:'Users',c:['user_id INT (PK)','join_date DATE','favorite_brand VARCHAR']},{n:'Orders',c:['order_id INT (PK)','order_date DATE','buyer_id INT (FK)']}],
setup:`CREATE TABLE Users(user_id INT,join_date TEXT,favorite_brand TEXT);CREATE TABLE Orders(order_id INT,order_date TEXT,item_id INT,buyer_id INT,seller_id INT);INSERT INTO Users VALUES(1,'2018-01-01','Lenovo'),(2,'2018-02-09','Samsung'),(3,'2018-01-19','LG'),(4,'2018-05-21','HP');INSERT INTO Orders VALUES(1,'2019-08-01',4,1,2),(2,'2018-08-02',2,1,3),(3,'2019-08-03',3,2,3),(4,'2018-08-04',1,4,2),(5,'2018-08-04',1,3,4),(6,'2019-08-05',2,3,4);`,
answer:`SELECT u.user_id AS buyer_id, u.join_date, COUNT(o.order_id) AS orders_in_2019\nFROM Users u\nLEFT JOIN Orders o ON u.user_id=o.buyer_id AND strftime('%Y',o.order_date)='2019'\nGROUP BY u.user_id, u.join_date;`,
hint:'Filter the year in the JOIN condition, not WHERE — so users with no 2019 orders still appear.',
insight:'Year filter in ON (not WHERE) is crucial — WHERE would eliminate non-matching LEFT JOIN rows.'},

{id:'lc1204',diff:'medium',topic:'window',source:'LC #1204',title:'Last Person to Fit in the Bus',
desc:'Find the last person who can board given a 1000kg weight limit (in turn order).',
schema:[{n:'Queue',c:['person_id INT (PK)','person_name VARCHAR','weight INT','turn INT']}],
setup:`CREATE TABLE Queue(person_id INT,person_name TEXT,weight INT,turn INT);INSERT INTO Queue VALUES(5,'Alice',250,1),(3,'Alex',350,2),(6,'John Cena',400,3),(2,'Marie',200,4),(4,'Bob',175,5),(1,'Winston',500,6);`,
answer:`SELECT person_name FROM (\n  SELECT person_name, SUM(weight) OVER (ORDER BY turn) AS cum_weight FROM Queue\n) t WHERE cum_weight <= 1000 ORDER BY cum_weight DESC LIMIT 1;`,
hint:'Running weight SUM ordered by turn. Last person where cumulative <= 1000.',
insight:'Running SUM window + filter + sort descending + LIMIT 1.'},

{id:'lc1280',diff:'medium',topic:'joins',source:'LC #1280',title:'Students and Examinations',
desc:'Find how many times each student attended each exam subject (including zero).',
schema:[{n:'Students',c:['student_id INT (PK)','student_name VARCHAR']},{n:'Subjects',c:['subject_name VARCHAR (PK)']},{n:'Examinations',c:['student_id INT (FK)','subject_name VARCHAR (FK)']}],
setup:`CREATE TABLE Students(student_id INT,student_name TEXT);CREATE TABLE Subjects(subject_name TEXT);CREATE TABLE Examinations(student_id INT,subject_name TEXT);INSERT INTO Students VALUES(1,'Alice'),(2,'Bob'),(13,'John'),(6,'Alex');INSERT INTO Subjects VALUES('Math'),('Physics'),('Programming');INSERT INTO Examinations VALUES(1,'Math'),(1,'Programming'),(1,'Physics'),(1,'Math'),(2,'Programming'),(1,'Math');`,
answer:`SELECT s.student_id, s.student_name, sub.subject_name, COUNT(e.subject_name) AS attended_exams\nFROM Students s CROSS JOIN Subjects sub\nLEFT JOIN Examinations e ON s.student_id=e.student_id AND sub.subject_name=e.subject_name\nGROUP BY s.student_id, s.student_name, sub.subject_name\nORDER BY s.student_id, sub.subject_name;`,
hint:'CROSS JOIN for all combinations. LEFT JOIN adds exam records. COUNT of nullable = 0 for no-shows.',
insight:'CROSS JOIN creates every student-subject pair. COUNT of nullable column returns 0 naturally.'},

{id:'lc1285',diff:'medium',topic:'window',source:'LC #1285',title:'Start and End of Continuous Ranges',
desc:'Find the start and end of each contiguous range of log_ids.',
schema:[{n:'Logs',c:['log_id INT (PK)']}],
setup:`CREATE TABLE Logs(log_id INT);INSERT INTO Logs VALUES(1),(2),(3),(7),(8),(10);`,
answer:`WITH grp AS (\n  SELECT log_id, log_id - ROW_NUMBER() OVER (ORDER BY log_id) AS island FROM Logs\n)\nSELECT MIN(log_id) AS start_id, MAX(log_id) AS end_id FROM grp GROUP BY island ORDER BY start_id;`,
hint:'Subtract ROW_NUMBER from log_id — constant within consecutive sequences.',
insight:'Classic gap-and-islands: id minus row_number is constant within consecutive ranges.'},

// HARD
{id:'lc185',diff:'hard',topic:'window',source:'LC #185',title:'Department Top Three Salaries',
desc:'Find employees in the top 3 unique salary earners in their department.',
schema:[{n:'Employee',c:['id INT (PK)','name VARCHAR','salary INT','departmentId INT (FK)']},{n:'Department',c:['id INT (PK)','name VARCHAR']}],
setup:`CREATE TABLE Employee(id INT,name TEXT,salary INT,departmentId INT);CREATE TABLE Department(id INT,name TEXT);INSERT INTO Employee VALUES(1,'Joe',85000,1),(2,'Henry',80000,2),(3,'Sam',60000,2),(4,'Max',90000,1),(5,'Janet',69000,1),(6,'Randy',85000,1),(7,'Will',70000,1);INSERT INTO Department VALUES(1,'IT'),(2,'Sales');`,
answer:`WITH ranked AS (\n  SELECT e.name, e.salary, d.name AS dept,\n    DENSE_RANK() OVER (PARTITION BY e.departmentId ORDER BY e.salary DESC) AS rnk\n  FROM Employee e JOIN Department d ON e.departmentId=d.id\n)\nSELECT dept AS Department, name AS Employee, salary AS Salary FROM ranked WHERE rnk <= 3;`,
hint:'DENSE_RANK() OVER (PARTITION BY departmentId ORDER BY salary DESC). Filter rank <= 3.',
insight:'DENSE_RANK handles ties — both tied employees appear. RANK skips; ROW_NUMBER cuts one.'},

{id:'lc601',diff:'hard',topic:'cte',source:'LC #601',title:'Human Traffic of Stadium',
desc:'Find rows with 100+ visitors that belong to 3+ consecutive id rows.',
schema:[{n:'Stadium',c:['id INT (PK)','visit_date DATE','people INT']}],
setup:`CREATE TABLE Stadium(id INT,visit_date TEXT,people INT);INSERT INTO Stadium VALUES(1,'2017-01-01',10),(2,'2017-01-02',109),(3,'2017-01-03',150),(4,'2017-01-04',99),(5,'2017-01-05',145),(6,'2017-01-06',1455),(7,'2017-01-07',199),(8,'2017-01-09',188);`,
answer:`WITH base AS (\n  SELECT *, id - ROW_NUMBER() OVER (ORDER BY id) AS grp FROM Stadium WHERE people >= 100\n)\nSELECT id, visit_date, people FROM base\nWHERE grp IN (SELECT grp FROM base GROUP BY grp HAVING COUNT(*)>=3)\nORDER BY visit_date;`,
hint:'Filter rows with 100+ people. Apply island detection (id - ROW_NUMBER). Keep groups of 3+.',
insight:'Two-step island: filter qualifying rows first, then detect consecutive groups among those.'},

{id:'lc569',diff:'hard',topic:'window',source:'LC #569',title:'Median Employee Salary',
desc:'Find the median salary of each company. For even counts both middle values qualify.',
schema:[{n:'Employee',c:['id INT (PK)','company VARCHAR','salary INT']}],
setup:`CREATE TABLE Employee(id INT,company TEXT,salary INT);INSERT INTO Employee VALUES(1,'A',2341),(2,'A',341),(3,'A',15),(4,'A',15314),(5,'A',451),(6,'A',513),(7,'B',15),(8,'B',13),(9,'B',1154),(10,'B',1345),(11,'B',1221),(12,'B',234),(13,'C',2345),(14,'C',2645),(15,'C',2645),(16,'C',2652),(17,'C',65);`,
answer:`WITH ranked AS (\n  SELECT id, company, salary,\n    ROW_NUMBER() OVER (PARTITION BY company ORDER BY salary, id) AS rn,\n    COUNT(*) OVER (PARTITION BY company) AS cnt\n  FROM Employee\n)\nSELECT id, company, salary FROM ranked WHERE rn BETWEEN cnt/2.0 AND cnt/2.0+1;`,
hint:'ROW_NUMBER per company (ordered by salary). Median rows satisfy: rn BETWEEN cnt/2.0 AND cnt/2.0+1.',
insight:'BETWEEN trick selects both middle rows for even counts and single middle for odd.'},

{id:'lc262',diff:'hard',topic:'aggregation',source:'LC #262',title:'Trips and Users',
desc:'Find the cancellation rate for unbanned users per day (Oct 1–3 2013), rounded to 2 decimal places.',
schema:[{n:'Trips',c:['id INT (PK)','client_id INT (FK)','driver_id INT (FK)','status TEXT','request_at DATE']},{n:'Users',c:['users_id INT (PK)','banned TEXT','role TEXT']}],
setup:`CREATE TABLE Trips(id INT,client_id INT,driver_id INT,city_id INT,status TEXT,request_at TEXT);CREATE TABLE Users(users_id INT,banned TEXT,role TEXT);INSERT INTO Trips VALUES(1,1,10,1,'completed','2013-10-01'),(2,2,11,1,'cancelled_by_driver','2013-10-01'),(3,3,12,6,'completed','2013-10-01'),(4,4,13,6,'cancelled_by_client','2013-10-01'),(5,1,10,1,'completed','2013-10-02'),(6,2,11,6,'completed','2013-10-02'),(7,3,12,6,'completed','2013-10-02'),(8,2,12,12,'completed','2013-10-03'),(9,3,10,12,'completed','2013-10-03'),(10,4,13,12,'cancelled_by_driver','2013-10-03');INSERT INTO Users VALUES(1,'No','client'),(2,'Yes','client'),(3,'No','client'),(4,'No','client'),(10,'No','driver'),(11,'No','driver'),(12,'No','driver'),(13,'No','driver');`,
answer:`SELECT t.request_at AS Day,\n  ROUND(SUM(t.status != 'completed') * 1.0 / COUNT(*), 2) AS "Cancellation Rate"\nFROM Trips t\nJOIN Users u1 ON t.client_id=u1.users_id AND u1.banned='No'\nJOIN Users u2 ON t.driver_id=u2.users_id AND u2.banned='No'\nWHERE t.request_at BETWEEN '2013-10-01' AND '2013-10-03'\nGROUP BY t.request_at;`,
hint:'Join Users twice (client + driver) filtering banned in the JOIN condition. SUM of non-completed / COUNT.',
insight:'Filtering in JOIN ON keeps per-join logic clean. SUM of boolean avoids CASE WHEN.'}

}

function setupDB(p){
  if(DB_){try{DB_.close();}catch(e){}}
  DB_=new SQL_.Database();
  try{DB_.run(p.setup);}catch(e){console.warn(e);}
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.flt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilter();
}
function handleSearch(q){searchQ=q.toLowerCase();applyFilter();}
function applyFilter(){
  filtered=P.filter(p=>{
    const md=activeFilter==='all'||p.diff===activeFilter||p.topic===activeFilter;
    const ms=!searchQ||p.title.toLowerCase().includes(searchQ)||p.topic.includes(searchQ);
    return md&&ms;
  });
  curIdx=0; renderList(); if(filtered.length)loadP(0);
}

function renderList(){
  const list=document.getElementById('prob-list');
  list.innerHTML='';
  filtered.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='prob-item'+(i===curIdx?' active':'');
    d.innerHTML=`<span class="prob-num">${i+1}</span>
      <span class="prob-title">${p.title}</span>
      ${solved[p.id]?'<span class="prob-check">✓</span>':''}
      <span class="prob-dot dot-${p.diff}"></span>`;
    d.onclick=()=>{curIdx=i;loadP(i);};
    list.appendChild(d);
  });
}

function loadP(idx){
  const p=filtered[idx];
  if(!p)return;
  document.querySelectorAll('.prob-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('ph-title').textContent=p.title;
  document.getElementById('ph-diff').textContent=p.diff;
  document.getElementById('ph-diff').className='diff-badge diff-'+p.diff;
  document.getElementById('ph-src').textContent=p.source;
  document.getElementById('ph-desc').textContent=p.desc;
  document.getElementById('nav-topic').textContent=p.topic;

  const strip=document.getElementById('schema-strip');
  strip.innerHTML='';
  (p.schema||[]).forEach(t=>{
    const box=document.createElement('div');
    box.className='schema-table';
    box.innerHTML=`<div class="schema-table-name">${t.n}</div><div class="schema-cols">${
      t.c.map(col=>{
        const isPK=col.includes('(PK)'), isFK=col.includes('(FK)');
        const clean=col.replace(' (PK)','').replace(' (FK)','');
        const parts=clean.split(' ');
        return `<div class="sc"><span class="cn">${parts[0]}</span> <span style="color:var(--muted)">${parts.slice(1).join(' ')}</span>${isPK?'<span class="pk">PK</span>':''}${isFK?'<span class="fk">FK</span>':''}</div>`;
      }).join('')
    }</div>`;
    strip.appendChild(box);
  });

  const ed=document.getElementById('editor');
  ed.value=''; ed.className='editor';
  const st=document.getElementById('result-status');
  st.textContent=solved[p.id]?'✓ Already solved':'Ready';
  st.className='result-status '+(solved[p.id]?'s-ok':'s-idle');
  document.getElementById('result-body').innerHTML='<div class="empty">Write your query and click Run (or Ctrl+Enter).</div>';
  curTab='output'; syncTabs(); lastUser=null; lastExp=null;
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx===filtered.length-1;
  document.getElementById('btn-run').disabled=false;
  setupDB(p);
  updateProgress();
  // scroll list item into view
  const items=document.querySelectorAll('.prob-item');
  if(items[idx])items[idx].scrollIntoView({block:'nearest'});
}

function runQuery(){
  const p=filtered[curIdx];
  const sql=document.getElementById('editor').value.trim();
  if(!sql)return;
  try{
    setupDB(p);
    const stmts=sql.split(';').map(s=>s.trim()).filter(Boolean);
    let lastRes=null;
    stmts.forEach(s=>{const r=DB_.exec(s);if(r.length)lastRes=r[0];});
    const userCols=lastRes?lastRes.columns:[];
    const userRows=lastRes?lastRes.values:[];

    // run expected
    const db2=new SQL_.Database(); db2.run(p.setup);
    const expStmts=p.answer.split(';').map(s=>s.trim()).filter(Boolean);
    let expRes=null;
    expStmts.forEach(s=>{const r=db2.exec(s);if(r.length)expRes=r[0];});
    db2.close();
    const expCols=expRes?expRes.columns:[];
    const expRows=expRes?expRes.values:[];

    lastUser={cols:userCols,rows:userRows};
    lastExp={cols:expCols,rows:expRows};

    const ok=cmp(userRows,expRows);
    const ed=document.getElementById('editor');
    ed.className='editor '+(ok?'correct':'wrong');
    const st=document.getElementById('result-status');
    if(ok){
      st.textContent=`✓ Correct! (${userRows.length} row${userRows.length!==1?'s':''})`;
      st.className='result-status s-ok';
      if(!solved[p.id]){solved[p.id]=true;localStorage.setItem('sql_prac_solved',JSON.stringify(solved));renderList();updateProgress();toast('🎉 Solved!','g');}
    } else {
      st.textContent=`✗ Wrong — ${userRows.length} row${userRows.length!==1?'s':''} returned`;
      st.className='result-status s-err';
    }
    curTab='output'; syncTabs(); renderTable(userCols,userRows);
  } catch(err){
    document.getElementById('editor').className='editor wrong';
    document.getElementById('result-status').textContent='⚠ SQL Error';
    document.getElementById('result-status').className='result-status s-warn';
    document.getElementById('result-body').innerHTML=`<div style="font-family:var(--mono);font-size:12px;color:var(--red);line-height:1.7">${err.message}</div>`;
    curTab='output'; syncTabs();
  }
}

function cmp(a,b){
  if(!a||!b)return false;
  const s=r=>[...r].map(row=>[...row].map(v=>v===null?'∅':String(v)).join('|')).sort().join('§');
  return s(a)===s(b);
}

function renderTable(cols,rows,into){
  const target=into||document.getElementById('result-body');
  if(!cols||!cols.length){target.innerHTML='<div class="empty">Query ran — no rows returned.</div>';return;}
  let h='<table class="rt"><thead><tr>';
  cols.forEach(c=>{h+=`<th>${c}</th>`;});
  h+='</tr></thead><tbody>';
  rows.forEach(r=>{h+='<tr>';r.forEach(v=>{h+=`<td>${v===null?'<span class="null-val">NULL</span>':v}</td>`;});h+='</tr>';});
  h+='</tbody></table>';
  target.innerHTML=h;
}

function switchTab(tab){
  curTab=tab; syncTabs();
  const body=document.getElementById('result-body');
  if(tab==='output'){
    if(lastUser)renderTable(lastUser.cols,lastUser.rows);
    else body.innerHTML='<div class="empty">Run your query first.</div>';
  } else if(tab==='expected'){
    if(!lastExp){
      const p=filtered[curIdx];
      const db2=new SQL_.Database(); db2.run(p.setup);
      let expRes=null;
      p.answer.split(';').map(s=>s.trim()).filter(Boolean).forEach(s=>{const r=db2.exec(s);if(r.length)expRes=r[0];});
      db2.close();
      lastExp={cols:expRes?expRes.columns:[],rows:expRes?expRes.values:[]};
    }
    body.innerHTML='<div style="font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Expected output</div>';
    const d=document.createElement('div'); body.appendChild(d);
    renderTable(lastExp.cols,lastExp.rows,d);
  } else {
    const p=filtered[curIdx];
    body.innerHTML=`<div class="hint-box" style="margin-bottom:10px"><strong style="color:var(--amber)">💡 Hint</strong><br><br>${p.hint}</div>
<div style="font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Answer</div>
<div class="ans-box">${p.answer}</div>
<div class="insight-box" style="margin-top:10px"><strong style="color:var(--blue)">Key insight</strong><br><br>${p.insight}</div>`;
  }
}
function syncTabs(){
  ['output','expected','hint'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('on',t===curTab));
}

function navigate(dir){
  const n=curIdx+dir;
  if(n<0||n>=filtered.length)return;
  curIdx=n; loadP(curIdx);
}

function updateProgress(){
  const tot=filtered.length;
  const done=filtered.filter(p=>solved[p.id]).length;
  document.getElementById('prog-fill').style.width=tot?(done/tot*100)+'%':'0%';
  document.getElementById('prog-txt').textContent=`${done} / ${tot}`;
}

function toast(msg,cls=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+cls;
  setTimeout(()=>{t.className='toast';},2500);
}

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runQuery();}
});

boot();
</script>
</body>
</html>
